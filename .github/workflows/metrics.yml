name: Metrics
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: isanthetroller
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Manila
          config_display: large
          config_order: base.header, isocalendar, base.activity+community, languages, topics, base.repositories

          # 3D isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Most used languages with details
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

          # Mastered technologies and topics (icon badges)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_topics_sort: stars
